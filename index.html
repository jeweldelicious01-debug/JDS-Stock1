<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Stock Manager & Event Control Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script type="module" src="app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased" x-data="stockApp()" x-init="init()">

    <!-- Authentication Screen Overlay -->
    <div x-show="!isAuthenticated && !authChecking" class="fixed inset-0 bg-slate-900 flex flex-col justify-center items-center z-50 p-4" x-cloak>
        <div class="bg-white p-8 rounded-xl max-w-sm w-full shadow-2xl border border-slate-200 text-center">
            <div class="w-16 h-16 bg-amber-50 text-amber-600 rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4 border border-amber-200">🔑</div>
            <h3 class="text-xl font-extrabold tracking-tight text-slate-800 uppercase mb-1">System Portal</h3>
            <p class="text-xs text-slate-500 mb-6">Inventory Ledger Authentication</p>
            <form @submit.prevent="verifyLogin()" class="space-y-4 text-left text-xs">
                <div>
                    <label class="block font-bold mb-1 text-slate-700 tracking-wide uppercase text-[10px]">Operator Username</label>
                    <input type="text" x-model="loginForm.username" placeholder="e.g. order or inward" class="border border-slate-300 p-2.5 w-full rounded-lg bg-slate-50 focus:ring-2 focus:ring-slate-500">
                </div>
                <div>
                    <label class="block font-bold mb-1 text-slate-700 tracking-wide uppercase text-[10px]">Passphrase Code</label>
                    <input type="password" x-model="loginForm.password" placeholder="••••••••" class="border border-slate-300 p-2.5 w-full rounded-lg text-center tracking-widest font-mono bg-slate-50 text-base focus:ring-2 focus:ring-slate-500">
                </div>
                <button type="submit" class="bg-slate-800 hover:bg-slate-900 text-white w-full py-3 rounded-lg font-bold text-xs mt-4 uppercase tracking-wider shadow-md transition">Unlock Corporate Dashboard</button>
            </form>
            <p x-show="loginError" x-text="loginError" class="text-rose-600 text-xs font-bold text-center mt-3" x-cloak></p>
        </div>
    </div>

    <!-- Active Management Dashboard Dashboard Workspace -->
    <main class="max-w-6xl mx-auto p-4 space-y-6" x-show="isAuthenticated" x-cloak>
        
        <!-- Safety Guard Loop protects workspace properties from early load failures -->
        <template x-if="ready">
            <div class="space-y-6">
                
                <header class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center gap-4 flex-wrap">
                    <div class="space-y-1">
                        <h1 class="text-2xl font-black tracking-tight text-slate-800 flex items-center gap-2">📊 Restaurant Inventory Operations</h1>
                        <p class="text-xs text-slate-500">Logged in as <span class="font-bold text-slate-800" x-text="currentUsername"></span> <span class="mx-2 text-slate-300">|</span> Security Scope: <span class="bg-slate-100 text-slate-800 font-bold px-2 py-0.5 rounded text-[10px] uppercase border border-slate-200" x-text="currentRole"></span></p>
                    </div>
                    <div class="flex gap-2 items-center flex-wrap">
                        <button @click="showAccountModal = true" class="text-xs bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 px-3 py-2 rounded-lg font-bold tracking-wide transition shadow-sm">👤 Security Settings</button>
                        <button x-show="currentRole === 'admin'" @click="showUserAdminModal = true" class="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-2 rounded-lg font-bold tracking-wide border border-indigo-200 transition shadow-sm">🧑‍💼 Operator Management</button>
                        <button x-show="currentRole === 'admin' || currentRole === 'inward'" @click="downloadInwardSupplierReport()" class="text-xs bg-amber-600 hover:bg-amber-700 text-white px-3 py-2 rounded-lg font-bold tracking-wide flex items-center gap-1.5 transition shadow-md">🧾 Supplier Inward Report (.xlsx)</button>
                        <button @click="downloadExcelReport()" class="text-xs bg-emerald-700 hover:bg-emerald-800 text-white px-3 py-2 rounded-lg font-bold tracking-wide flex items-center gap-1.5 transition shadow-md">📊 Export 30-Day Excel (.xlsx)</button>
                        <button @click="logout()" class="text-xs bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-700 font-bold px-3 py-2 rounded-lg transition">🔒 Close Session</button>
                    </div>
                </header>

                <!-- Supplier Purchase Order Desk -->
                <section class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4" x-show="currentRole === 'admin' || currentRole === 'order'">
                    <div class="text-xs font-black uppercase tracking-wider text-indigo-800 border-b border-slate-100 pb-2">📝 Automated Supplier Purchase Order Desk</div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                        <div class="bg-slate-50 p-3 rounded-lg border">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Target Supplier</label>
                            <select x-model="orderDesk.supplierId" @change="orderDesk.selectedItemId = ''" class="border p-2.5 rounded-md w-full bg-white font-bold text-slate-700">
                                <option value="">-- Choose Vendor --</option>
                                <template x-for="sup in suppliers" :key="sup.id">
                                    <option :value="sup.id" x-text="sup.name"></option>
                                </template>
                            </select>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-lg border md:col-span-2 space-y-3">
                            <div class="flex gap-2 items-end">
                                <div class="flex-1">
                                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Select Product Item (Filtered by Supplier)</label>
                                    <select x-model="orderDesk.selectedItemId" :disabled="!orderDesk.supplierId" class="border p-2 rounded-md w-full bg-white font-medium text-slate-700 disabled:opacity-50">
                                        <option value="">-- Choose Product --</option>
                                        <!-- 🟢 FIXED: Now loops through filtered list instead of master list -->
                                        <template x-for="item in filteredOrderDeskItems" :key="item.id">
                                            <option :value="item.id" x-text="item.name"></option>
                                        </template>
                                    </select>
                                </div>
                                <div class="w-24">
                                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Qty</label>
                                    <input type="number" x-model.number="orderDesk.selectedQty" placeholder="10" class="border p-2 rounded-md w-full text-center bg-white font-mono font-bold">
                                </div>
                                <button @click="addItemToOrder()" class="bg-indigo-700 text-white font-bold px-4 py-2 rounded-md transition uppercase text-[11px]">Add Item</button>
                            </div>
                            <div class="border rounded-md bg-white p-2.5 space-y-1.5" x-show="orderDesk.basket.length > 0">
                                <template x-for="(b, idx) in orderDesk.basket" :key="idx">
                                    <div class="flex justify-between items-center text-xs bg-slate-50 border p-1 rounded font-mono">
                                        <span>📌 <span class="font-sans" x-text="b.name"></span> — Qty: <span class="font-bold text-indigo-600" x-text="b.qty"></span></span>
                                        <button @click="removeOrderBasketItem(idx)" class="text-rose-600 font-bold px-1 text-[11px]">Remove</button>
                                    </div>
                                </template>
                            </div>
                            <button @click="sendWhatsAppOrder()" x-show="orderDesk.basket.length > 0 && orderDesk.supplierId" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg text-center uppercase tracking-wider transition shadow-sm">
                                📱 Send Thread to Supplier WhatsApp
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Order Verification & Stock Ingest Desk -->
                <section class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-3" x-show="currentRole === 'admin' || currentRole === 'inward'">
                    <div class="text-xs font-black uppercase tracking-wider text-emerald-800 border-b border-slate-100 pb-2">📦 Pending Orders Verification & Stock Approval Desk</div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                        <template x-for="order in purchaseOrders" :key="order.id">
                            <div class="border p-4 rounded-xl space-y-3 transition bg-white" :class="order.status === 'PENDING' ? 'border-amber-300 bg-amber-50/10' : 'border-slate-200 bg-slate-50/50 opacity-70'">
                                <div class="flex justify-between items-center">
                                    <div>
                                        <span class="text-sm font-black text-slate-800" x-text="order.supplier_name"></span>
                                        <div class="text-[10px] text-slate-400 font-mono" x-text="'Issued by: ' + order.created_by + ' | ' + new Date(order.created_at).toLocaleDateString('en-GB')"></div>
                                    </div>
                                    <span class="px-2 py-0.5 rounded text-[10px] font-black uppercase" :class="order.status === 'PENDING' ? 'bg-amber-100 text-amber-800' : 'bg-emerald-100 text-emerald-800'" x-text="order.status === 'PENDING' ? '⏳ Pending Supply' : '✅ Received'"></span>
                                </div>
                                <div class="bg-white border rounded-lg p-2.5 divide-y font-mono space-y-1">
                                    <template x-for="it in order.items">
                                        <div class="flex justify-between items-center py-1 text-xs">
                                            <span class="font-sans text-slate-700 font-medium" x-text="it.name"></span>
                                            <div class="flex items-center gap-1.5">
                                                <span class="text-slate-400 text-[11px]">Qty:</span>
                                                <input type="number" x-model.number="it.qty" :disabled="order.status !== 'PENDING'" class="w-14 border text-center rounded p-0.5 bg-slate-50 font-bold text-slate-900 focus:ring-1 focus:ring-emerald-500">
                                            </div>
                                        </div>
                                    </template>
                                </div>
                                <button @click="approveIncomingOrder(order)" x-show="order.status === 'PENDING'" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white text-xs font-bold py-2 rounded-lg transition uppercase tracking-wider text-[11px] shadow-sm">
                                    ✔ Approve Consignment & Ingest Stock
                                </button>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- Manual Operation Desks -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" x-show="currentRole === 'admin' || currentRole === 'inward' || currentRole === 'outward'">
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4" x-show="currentRole === 'admin' || currentRole === 'inward'">
                        <div class="text-xs font-bold uppercase tracking-wider text-emerald-800 border-b border-slate-100 pb-2">📥 Log New Inward Manual Consignment</div>
                        <div class="grid grid-cols-4 gap-3 text-xs">
                            <div class="col-span-2">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">First Select Supplier</label>
                                <select x-model="formInward.supplierName" @change="formInward.itemId = ''" class="border border-slate-300 p-2.5 rounded-lg bg-slate-50 w-full font-bold text-slate-700">
                                    <option value="">-- Choose Supplier --</option>
                                    <template x-for="sup in suppliers" :key="sup.id">
                                        <option :value="sup.name" x-text="sup.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="col-span-2">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Select Product (Filtered)</label>
                                <select x-model="formInward.itemId" :disabled="!formInward.supplierName" class="border border-slate-300 p-2.5 rounded-lg bg-slate-50 w-full font-medium text-slate-700 disabled:opacity-50">
                                    <option value="">-- Select Product --</option>
                                    <!-- 🟢 FIXED: Correctly configured loop context -->
                                    <template x-for="item in filteredInwardItems" :key="item.id">
                                        <option :value="item.id" x-text="item.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="col-span-4">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Units</label>
                                <input type="number" x-model.number="formInward.qty" placeholder="Units" class="border border-slate-300 p-2.5 rounded-lg text-center font-mono bg-slate-50 w-full font-bold">
                            </div>
                        </div>
                        <button @click="addInward()" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white text-xs font-bold py-2.5 rounded-lg shadow-sm transition uppercase tracking-wider mt-2">Commit Inward Entry to Cloud</button>
                        <div class="pt-3 border-t border-dashed border-slate-200 flex flex-col gap-3" x-show="currentRole === 'admin'">
                            <button @click="showNewItemModal = true" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-2 rounded-md transition shadow-xs text-xs">➕ Add New Item Portfolio Axis</button>
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4" x-show="currentRole === 'admin' || currentRole === 'outward'">
                        <div class="text-xs font-bold uppercase tracking-wider text-rose-800 border-b border-slate-100 pb-2">📤 Issue Line Outward Allocation</div>
                        <div class="grid grid-cols-3 gap-3 text-xs">
                            <select x-model="formOutward.itemId" class="border border-slate-300 p-2.5 rounded-lg bg-slate-50 w-full font-medium text-slate-700">
                                <option value="">-- Item --</option>
                                <template x-for="item in items" :key="item.id">
                                    <option :value="item.id" x-text="item.name"></option>
                                </template>
                            </select>
                            <select x-model="formOutward.department" class="border border-slate-300 p-2.5 rounded-lg bg-slate-50 w-full font-bold text-slate-700">
                                <template x-for="dept in departments" :key="dept">
                                    <option :value="dept" x-text="dept"></option>
                                </template>
                            </select>
                            <input type="number" x-model.number="formOutward.qty" placeholder="Units" class="border border-slate-300 p-2.5 rounded-lg text-center font-mono bg-slate-50 w-full font-bold">
                        </div>
                        <button @click="deductOutward()" class="w-full bg-rose-700 hover:bg-rose-800 text-white text-xs font-bold py-2.5 rounded-lg shadow-sm transition uppercase tracking-wider">Execute Deduction & Issue Stock</button>
                    </div>
                </div>

                <!-- Ledger Infrastructure Board Table -->
                <section class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b border-slate-200 flex flex-wrap justify-between items-center gap-3">
                        <div class="space-y-0.5">
                            <div class="text-sm font-extrabold text-slate-800 uppercase tracking-wide">Live Infrastructure Ledger Engine</div>
                        </div>
                        <div class="flex flex-wrap gap-1.5 text-xs font-bold">
                            <button @click="filterCat = 'all'" :class="filterCat === 'all' ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'" class="px-3 py-1.5 rounded-lg border shadow-2xs transition">📁 All Categories</button>
                            <template x-for="cat in categories" :key="cat.id">
                                <button @click="filterCat = cat.name" :style="'background-color: ' + (filterCat === cat.name ? cat.border_color : cat.bg_color) + '; color: ' + (filterCat === cat.name ? '#fff' : cat.text_color) + '; border-color: ' + cat.border_color" class="px-2.5 py-1 rounded border transition" x-text="cat.emoji + ' ' + cat.name"></button>
                            </template>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs border-collapse">
                            <thead>
    <tr class="bg-slate-50 border-b text-slate-500 uppercase tracking-wider text-[11px] font-bold">
        <th class="p-3 w-16 text-center" x-show="currentRole === 'admin'">Move</th>
        <th class="p-3">Item Name</th>
        <th class="p-3">Category Tag</th>
        
        <th class="p-3">Assigned Supplier</th>
        
        <th class="p-3 text-center">Live Stock Balance</th>
        <th class="p-3">Status Vector</th>
        <th class="p-3 text-center">Safety Limit</th>
        <th class="p-3 text-center" x-show="currentRole !== 'readonly'">Unit Price (MRP)</th>
        <th class="p-3 text-right" x-show="currentRole === 'admin' || currentRole === 'inward'">Management Axis</th>
    </tr>
</thead>
                           <tbody class="divide-y divide-slate-100">
    <template x-for="item in processedItems" :key="item.id">
        <tr :class="item.stock <= item.threshold ? 'bg-rose-50/40 font-medium' : 'bg-white hover:bg-slate-50/50'" class="transition">
            <td class="p-4 text-center space-x-1 whitespace-nowrap" x-show="currentRole === 'admin'">
                <button @click="shiftOrder(item.id, 'up')" class="text-slate-400 hover:text-slate-800 font-bold">▲</button>
                <button @click="shiftOrder(item.id, 'down')" class="text-slate-400 hover:text-slate-800 font-bold">▼</button>
            </td>
            <td class="p-4 font-extrabold text-slate-900 text-sm" x-text="item.name"></td>
            <td class="p-4">
                <span :style="'background-color: ' + item.bg + '; color: ' + item.text_color + '; border-color: ' + item.border" class="px-2.5 py-1 rounded-md text-[10px] uppercase font-extrabold border shadow-2xs whitespace-nowrap" x-text="item.emoji + ' ' + item.category_name"></span>
            </td>
            
            <td class="p-4 font-semibold text-slate-600 text-xs">
                <span class="bg-slate-100 px-2 py-1 rounded border border-slate-200" x-text="item.supplier_name || 'General Vendor'"></span>
            </td>
            
            <td class="p-4 text-center font-mono text-sm font-black" :class="item.stock <= item.threshold ? 'text-rose-600' : 'text-slate-800'" x-text="item.stock"></td>
            <td class="p-4">
                <template x-if="item.stock === 0"><span class="bg-rose-600 text-white text-[9px] px-2 py-0.5 rounded-sm font-black uppercase tracking-wider">🚨 depleted</span></template>
                <template x-if="item.stock > 0 && item.stock <= item.threshold"><span class="bg-amber-500 text-slate-950 text-[9px] px-2 py-0.5 rounded-sm font-black uppercase tracking-wider">⚠️ breach limit</span></template>
                <template x-if="item.stock > item.threshold"><span class="bg-emerald-100 text-emerald-800 border border-emerald-200 text-[10px] px-2 py-0.5 rounded-md font-bold">Stable Matrix</span></template>
            </td>
            <td class="p-4 text-center font-mono text-slate-400 font-medium" x-text="item.threshold"></td>
            <td class="p-4 text-center font-mono font-bold text-slate-700" x-show="currentRole !== 'readonly'" x-text="'₹' + (item.mrp || 0)"></td>
            <td class="p-4 text-right space-x-2.5 whitespace-nowrap" x-show="currentRole === 'admin' || currentRole === 'inward'">
                <button @click="changeItemName(item)" class="text-slate-600 font-bold text-[11px]">✏️ Edit Details</button>
                <span class="text-slate-200">|</span>
                <button @click="modifyThreshold(item)" class="text-slate-600 font-bold text-[11px]">Limit</button>
                <span x-show="currentRole === 'admin'" class="text-slate-200">|</span>
                <button x-show="currentRole === 'admin'" @click="purgeItem(item.id)" class="text-rose-600 font-bold text-[11px]">Purge</button>
            </td>
        </tr>
    </template>
</tbody>
                        </table>
                    </div>
                </section>
                
                <!-- Security Passphrase Modal -->
                <div x-show="showAccountModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-50 p-4" x-cloak>
                    <form @submit.prevent="changeMyPassword()" class="bg-white p-6 rounded-xl max-w-sm w-full shadow-2xl space-y-4 border border-slate-200">
                        <h3 class="text-sm font-bold uppercase text-slate-800 border-b pb-1">👤 Security Key Settings</h3>
                        <div class="space-y-3 text-xs">
                            <input type="password" placeholder="Current Passphrase" autocomplete="current-password" x-model="accountForm.currentPassword" class="border p-2 w-full rounded-md bg-slate-50">
                            <input type="password" placeholder="New Secret Security Key" autocomplete="new-password" x-model="accountForm.newPassword" class="border p-2 w-full rounded-md bg-slate-50">
                        </div>
                        <p x-show="accountError" x-text="accountError" class="text-rose-600 text-[11px] font-bold" x-cloak></p>
                        <p x-show="accountSuccess" x-text="accountSuccess" class="text-emerald-600 text-[11px] font-bold" x-cloak></p>
                        <div class="flex gap-2 pt-2">
                            <button type="button" @click="showAccountModal = false" class="flex-1 bg-slate-100 border text-xs font-bold py-2 rounded-lg">Dismiss</button>
                            <button type="submit" class="flex-1 bg-slate-800 text-white text-xs font-bold py-2 rounded-lg">Apply Passphrase Update</button>
                        </div>
                    </form>
                </div>

                <!-- Operator Accounts Admin Directory Panel -->
                <div x-show="showUserAdminModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-50 p-4" x-cloak>
                    <div class="bg-white p-6 rounded-xl max-w-lg w-full shadow-2xl space-y-4 border border-slate-200 max-h-[85vh] overflow-y-auto">
                        <h3 class="text-sm font-bold uppercase text-slate-800 border-b pb-1">🧑‍💼 Authorized System Operators Directory</h3>
                        <div class="border rounded-lg bg-slate-50 overflow-hidden divide-y max-h-48 overflow-y-auto">
                            <template x-for="u in users" :key="u.id">
                                <div class="p-3 flex items-center justify-between gap-3 bg-white text-xs">
                                    <div>
                                        <div class="font-extrabold text-slate-800 text-sm" x-text="u.username"></div>
                                        <div class="text-[10px] font-mono text-slate-400 uppercase" x-text="'Scope: ' + u.role"></div>
                                    </div>
                                    <div class="flex items-center gap-1.5">
                                        <select @change="changeUserRole(u.id, $event.target.value)" class="border rounded p-1 bg-slate-50 text-[11px] font-bold">
                                            <option value="admin" :selected="u.role === 'admin'">admin</option>
                                            <option value="inward" :selected="u.role === 'inward'">inward</option>
                                            <option value="outward" :selected="u.role === 'outward'">outward</option>
                                            <option value="order" :selected="u.role === 'order'">order</option>
                                            <option value="readonly" :selected="u.role === 'readonly'">readonly</option>
                                        </select>
                                        <button @click="promptResetPassword(u)" class="text-[10px] bg-slate-50 hover:bg-slate-100 border px-2 py-1 rounded font-medium">Reset Key</button>
                                        <button @click="deleteUser(u.id)" class="text-[10px] bg-rose-50 border border-rose-100 text-rose-700 font-bold px-2 py-1 rounded">Delete</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <div class="border-t pt-3 space-y-2">
                            <div class="text-[11px] font-bold uppercase text-slate-400 tracking-wider">Provision New Operator Profile:</div>
                            <div class="grid grid-cols-2 gap-2 text-xs">
                                <input type="text" x-model="newUserForm.username" placeholder="Username" class="border p-2 rounded bg-slate-50">
                                <input type="password" x-model="newUserForm.password" placeholder="Passphrase (6+ chars)" class="border p-2 rounded bg-slate-50">
                                <select x-model="newUserForm.role" class="border p-2 rounded bg-slate-50 font-bold col-span-2">
                                    <option value="inward">inward</option>
                                    <option value="outward">outward</option>
                                    <option value="order">order</option>
                                    <option value="readonly">readonly</option>
                                </select>
                            </div>
                            <button @click="createUser()" class="w-full bg-slate-800 text-white font-bold py-2 rounded text-xs uppercase tracking-wide">Save Operator to Cloud</button>
                        </div>
                        <button @click="showUserAdminModal = false" class="w-full bg-slate-100 text-xs font-bold py-2.5 rounded-lg border">Dismiss Panel</button>
                    </div>
                </div>

                <!-- Portfolio Entry Modal Window -->
                <div x-show="showNewItemModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-50 p-4" x-cloak>
                    <div class="bg-white p-6 rounded-xl max-w-sm w-full shadow-2xl space-y-4 border border-slate-200">
                        <h3 class="text-sm font-black uppercase text-slate-800 tracking-wide border-b pb-1">➕ Append Portfolio Tracking row</h3>
                        <div class="space-y-3 text-xs">
                            <div>
                                <label class="block font-bold text-slate-600 mb-1">Product Description Label</label>
                                <input type="text" x-model="newItemForm.name" class="border border-slate-300 p-2 w-full rounded-md" placeholder="e.g. Cardamom Powder">
                            </div>
                            <div>
                                <label class="block font-bold text-slate-600 mb-1">Select Base Segment ID</label>
                                <select x-model="newItemForm.categoryId" class="border border-slate-300 p-2 w-full rounded-md bg-white text-slate-700">
                                    <option value="">-- Assign Portfolio Group --</option>
                                    <template x-for="cat in categories" :key="cat.id">
                                        <option :value="cat.id" x-text="cat.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="block font-bold text-slate-600 mb-1">Link Default Supplier/Vendor</label>
                                <select x-model="newItemForm.supplierName" class="border border-slate-300 p-2 w-full rounded-md bg-white text-slate-700">
                                    <option value="">-- Choose Supplier --</option>
                                    <template x-for="sup in suppliers" :key="sup.id">
                                        <option :value="sup.name" x-text="sup.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div><label class="block font-bold text-slate-600 mb-1">Safety Limit</label><input type="number" x-model.number="newItemForm.threshold" class="border border-slate-300 p-2 w-full rounded-md text-center" placeholder="10"></div>
                                <div x-show="currentRole !== 'readonly'"><label class="block font-bold text-slate-600 mb-1">Unit Price (MRP)</label><input type="number" x-model.number="newItemForm.mrp" class="border border-slate-300 p-2 w-full rounded-md text-center" placeholder="₹0"></div>
                            </div>
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button @click="showNewItemModal = false" class="flex-1 bg-slate-100 border text-xs font-bold py-2 rounded-lg">Dismiss</button>
                            <button @click="submitNewItem()" class="flex-1 bg-slate-800 text-white text-xs font-bold py-2 rounded-lg">Commit Axis</button>
                        </div>
                    </div>
                </div>

            </div>
        </template>
        
    </main>
</body>
</html>
